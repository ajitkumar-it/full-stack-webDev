<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery portal</title>
</head>

<body>
  <div>
    <h2>Pete's Pizza Delivery</h2>
    <h3>Online Order Form</h3>
    <h4>*required fields</h4>
    <form action="">
      <fieldset>
        <legend>Customer details:</legend>
        <label for="name">*Name:</label>
        <input type="text" id="name" required><br><br>
        <label for="address">*Address:</label>
        <input type="text" id="address" required><br><br>
        <label for="city">*Town/city</label>
        <input type="text" id="city" required><br><br>
        <label for="post">*Postcode:</label>
        <input type="number" id="post" required><br><br>
        <label for="phone">*Tel:</label>
        <input type="number" id="phone" required><br><br>
        <label for="email">*Email:</label>
        <input type="email" id="email" required>
      </fieldset><br>
      <fieldset>
        <legend>Topping*</legend>
        <label for="topping"></label>
        <input type="radio" id="margbenita" name="topping">
        <label for="margbenita">Margbenita</label><br>
        <input type="radio" id="four" name="topping">
        <label for="four">Four Seasons</label><br>
        <input type="radio" id="Meat" name="topping">
        <label for="Meat">Meat Feast</label>
      </fieldset>
      <fieldset>
        <legend>Size*</legend>
        <label for="size"></label>
        <input type="radio" id="small" name="size">
        <label for="small">Small</label><br>
        <input type="radio" id="medium" name="size">
        <label for="medium">Medium</label><br>
        <input type="radio" id="large" name="size">
        <label for="large">Large</label>
      </fieldset>
      <fieldset>
        <legend>Extras*</legend>
        <label for="extras"></label>
        <input type="checkbox" id="mushrooms" name="extras">
        <label for="mushrooms">Mushrooms</label><br>
        <input type="checkbox" id="pepper" name="extras">
        <label for="pepper">Green peppers</label><br>
        <input type="checkbox" id="anchovies" name="extras">
        <label for="anchovies">Anchovies</label><br>
        <input type="checkbox" id="cheese" name="extras">
        <label for="cheese">Extra cheese</label>
      </fieldset>
      <br><br>
      <fieldset>
        <legend>Delivery</legend>
        <label for="time">Preferred delivery time:</label>
        <input type="time" id="time"><br><br>
        <label for="comment">Delivery instructions:</label><br>
        <textarea rows="5" cols="40"></textarea>
      </fieldset><br><br>
      <button type="submit">Submit order</button>
    </form>
  </div>
</body>

</html>
